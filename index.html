 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📦InventoryHub Pro</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <!-- Header -->
    <header>
        <div class="logo">
            <i class="fa-solid fa-boxes-stacked"></i>
            <h1>InventoryHub Pro</h1>
        </div>
        <button id="darkModeBtn">🌙 Dark Mode</button>
    </header>
    <!-- Dashboard -->
    <section class="dashboard">
        <div class="card">
            <h2 id="totalItems">0</h2>
            <p>Total Items</p>
        </div>
        <div class="card">
            <h2 id="lowStock">0</h2>
            <p>Low Stock</p>
        </div>
        <div class="card">
            <h2 id="outStock">0</h2>
            <p>Out of Stock</p>
        </div>
    </section>
    <!-- Add Item -->
    <section class="form-section">
        <h2>Add Inventory Item</h2>
        <div class="form-grid">
            <input
                type="text"
                id="itemName"
                placeholder="Item Name">
            <select id="category">
                <option value="">Select Category</option>
                <option>Dairy</option>
                <option>Vegetables</option>
                <option>Fruits</option>
                <option>Beverages</option>
                <option>Bakery</option>
                <option>Frozen</option>
                <option>Snacks</option>
                <option>Others</option>
            </select>
            <input
                type="number"
                id="quantity"
                placeholder="Quantity">
            <button onclick="addItem()">
                <i class="fa-solid fa-plus"></i>
                Add Item
            </button>
        </div>
    </section>
    <!-- Inventory List -->
    <section class="table-section">
        <h2>Inventory List</h2>
        <div class="table-controls">
            <input
                type="text"
                id="searchBox"
                placeholder="🔍 Search Item..."
                onkeyup="searchItems()">
            <div class="buttons">
                <button onclick="exportCSV()">
                    Export CSV
                </button>
                <button onclick="document.getElementById('importFile').click()">
                    Import CSV
                </button>
                <button onclick="clearInventory()">
                    Clear All
                </button>
            </div>
        </div>
        <input
            type="file"
            id="importFile"
            accept=".csv"
            style="display:none">
        <table>
            <thead>
                <tr>
                    <th>Item Name</th>
                    <th>Category</th>
                    <th>Quantity</th>
                    <th>Status</th>
                    <th>Date Added</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="inventoryTable">
            </tbody>
        </table>
    </section>
    <!-- Footer -->
    <footer>
        <p>
            InventoryHub Pro © 2026
        </p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
